# Nginx Configuration for DeRoyal Hotspot OS (DHOS) - Single Domain Pattern
# Save to: /etc/nginx/sites-available/deroyalhotspot

server {
    listen 80;
    server_name deroyalhotspot.name.ng;

    # React compiled files directory
    root /var/www/deroyalhotspot/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/deroyalhotspot.access.log;
    error_log /var/log/nginx/deroyalhotspot.error.log;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Backend Express API Proxy Route
    location /api/v1/ {
        proxy_pass http://localhost:5000/api/v1/;
        proxy_http_version 1.1;
        
        # Headers for WebSockets and API requests forwarding
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        
        # Real client IP forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
